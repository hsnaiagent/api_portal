[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/gemini/status"
  to = "/.netlify/functions/gemini"
  status = 200

[[redirects]]
  from = "/api/gemini/generate"
  to = "/.netlify/functions/gemini"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
